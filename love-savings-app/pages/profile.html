<div class="profile-card">
    <div class="profile-avatar" id="profile-avatar">👤</div>
    <div class="profile-info">
        <h3 id="profile-nickname">用户昵称</h3>
        <p id="profile-account" class="profile-account">账号信息</p>
    </div>
</div>

<div class="profile-stats">
    <div class="profile-stat">
        <span class="profile-stat-value" id="profile-intimacy">0</span>
        <span class="profile-stat-label">亲密度</span>
    </div>
    <div class="profile-stat">
        <span class="profile-stat-value" id="profile-level">1</span>
        <span class="profile-stat-label">等级</span>
    </div>
    <div class="profile-stat">
        <span class="profile-stat-value" id="profile-records">0</span>
        <span class="profile-stat-label">记录数</span>
    </div>
</div>

<div class="profile-menu">
    <button class="profile-btn" onclick="openEditProfile()">✏️ 编辑资料</button>
    <button class="profile-btn" onclick="openPartnerBind()">💕 绑定伴侣</button>
    <button class="profile-btn" onclick="openBackupForm()">💾 数据管理</button>
</div>
