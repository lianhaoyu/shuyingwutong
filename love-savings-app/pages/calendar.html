<div class="calendar-header">
    <button class="calendar-nav" onclick="prevMonth()">◀ 上月</button>
    <span id="calendar-title" class="calendar-title">2024年1月</span>
    <button class="calendar-nav" onclick="nextMonth()">下月 ▶</button>
</div>
<div id="calendar-grid" class="calendar-grid"></div>
<div class="calendar-legend">
    <div class="legend-item">
        <span class="legend-box today-box"></span>
        <span>今天</span>
    </div>
    <div class="legend-item">
        <span class="legend-box checked-box"></span>
        <span>已签到</span>
    </div>
    <div class="legend-item">
        <span class="legend-box anniversary-box"></span>
        <span>纪念日</span>
    </div>
</div>
