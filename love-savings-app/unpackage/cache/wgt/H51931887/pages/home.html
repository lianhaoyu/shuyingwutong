<div id="today-panel" class="today-panel">
    <h3>🔔 今日事项</h3>
    <div id="today-items" class="today-items"></div>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-icon">🌸</div>
        <div class="stat-label">思念储蓄</div>
        <div id="miss-count" class="stat-value">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-icon">💭</div>
        <div class="stat-label">情绪储蓄</div>
        <div id="emotion-count" class="stat-value">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-icon">✨</div>
        <div class="stat-label">幸福储蓄</div>
        <div id="happiness-count" class="stat-value">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-icon">💝</div>
        <div class="stat-label">和解次数</div>
        <div id="reconcile-count" class="stat-value">0</div>
    </div>
</div>

<div class="welcome-card">
    <h2>今天，你想TA了吗？</h2>
    <div class="checkin-section">
        <button id="checkin-btn" class="checkin-btn" onclick="handleCheckin()">💕</button>
        <p id="checkin-status" class="checkin-status">今日未签到</p>
    </div>
</div>

<div class="love-quote">
    <p id="quote-text">"双向奔赴的爱，才最有意义"</p>
</div>
